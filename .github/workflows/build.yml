name: Build Check

on:
  pull_request:
    branches: ["**"]
    paths:
      - 'meet-translator/**'

# ──────────────────────────────────────────────────────────────────────────────
# meet-translator サーバーのリリースビルド確認 (マルチプラットフォーム)
#
# release.yml と同じマトリクス・GPU フラグでビルドし、PR 段階でリリースビルドの
# 失敗を検知する。
# ──────────────────────────────────────────────────────────────────────────────

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-amd64
            gpu: cpu
          - os: ubuntu-24.04-arm
            name: linux-arm64
            gpu: cpu
          - os: macos-latest
            name: darwin-arm64
            gpu: metal
          - os: windows-latest
            name: windows-amd64
            gpu: cpu

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: meet-translator/server/go.mod
          cache: false

      - name: Install build tools (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get install -y cmake build-essential ninja-build

      # macOS: cmake は Xcode CLT で利用可能。追加インストール不要。

      # pin している llama.cpp checkout は多数のモデルファイルを含み大量メモリを消費するため、
      # Ubuntu ランナー (特に ARM 2-core/8GB) でスワップを追加して OOM を防ぐ。
      - name: Add swap space (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          if ! swapon --show | grep -q /swapfile; then
            sudo fallocate -l 4G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          fi

      - name: Install build tools (Windows)
        if: matrix.os == 'windows-latest'
        run: echo "C:/msys64/usr/bin" >> $GITHUB_PATH

      # キャッシュキーに GPU 種別・bridge ファイルを含め restore-keys は設定しない。
      # restore-keys によるフォールバックは cmake の .built 番人ファイルが存在する
      # 古いキャッシュを復元し cmake がスキップされ古いヘッダーでビルドが壊れる
      # 原因となるため使用しない。
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            meet-translator/server/vendor
          key: ${{ runner.os }}-${{ runner.arch }}-build-${{ matrix.gpu }}-${{ hashFiles('meet-translator/server/Makefile', 'meet-translator/server/llama_bridge.cpp', 'meet-translator/server/llama_bridge.h', 'meet-translator/server/whisper_bridge.cpp', 'meet-translator/server/whisper_bridge.h') }}

      - name: Build
        working-directory: meet-translator/server
        run: make build GPU=${{ matrix.gpu }}
