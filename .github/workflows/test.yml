name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# ──────────────────────────────────────────────────────────────────────────────
# meet-translator サーバーのテスト
#
# CGo が必要なため whisper.cpp + llama.cpp を先にビルドしてから go test を実行する。
# Linux/CPU ビルドで実施（CI コスト最小化）。
# ──────────────────────────────────────────────────────────────────────────────

jobs:
  test:
    name: Server Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: meet-translator/server/go.mod
          cache: false

      - name: Install build tools
        run: sudo apt-get install -y cmake build-essential

      # whisper.cpp + llama.cpp のビルド (CGo ヘッダーが必要)
      - name: Build native dependencies
        working-directory: meet-translator/server
        run: make deps GPU=cpu

      # キャッシュを有効化してテストの再実行を高速化
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('meet-translator/server/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run tests
        working-directory: meet-translator/server
        run: go test -v -count=1 -timeout=120s ./...

      - name: Check binary builds
        working-directory: meet-translator/server
        run: make GPU=cpu
