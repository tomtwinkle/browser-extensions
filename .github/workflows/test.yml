name: Test

on:
  pull_request:
    branches: ["**"]

# ──────────────────────────────────────────────────────────────────────────────
# meet-translator サーバーのテスト (マルチプラットフォーム)
#
# CGo が必要なため whisper.cpp + llama.cpp を先にビルドしてから go test を実行する。
# 全プラットフォームで CPU ビルドを使用（CI コスト最小化）。
# ──────────────────────────────────────────────────────────────────────────────

defaults:
  run:
    shell: bash

jobs:
  extension-tests:
    name: Extension Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Check extension scripts
        run: |
          node --check meet-translator/extension/shared.js
          node --check meet-translator/extension/background.js
          node --check meet-translator/extension/content.js
          node --check meet-translator/extension/offscreen.js
          node --check meet-translator/extension/popup.js
          node --check meet-translator/extension/options.js
          node --check meet-translator/extension/i18n.js

      - name: Run extension tests
        run: node --test meet-translator/extension/tests/*.test.js

  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: ubuntu-amd64
          - os: ubuntu-24.04-arm
            name: ubuntu-arm64
          - os: macos-latest
            name: macos-arm64
          - os: windows-latest
            name: windows-amd64

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: meet-translator/server/go.mod
          cache: false

      - name: Install build tools (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get install -y cmake build-essential

      # macOS: cmake は Xcode CLT で利用可能。追加インストール不要。

      # pin している llama.cpp checkout は多数のモデルファイルを含み大量メモリを消費するため、
      # Ubuntu ランナー (特に ARM 2-core/8GB) でスワップを追加して OOM を防ぐ。
      - name: Add swap space (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          if ! swapon --show | grep -q /swapfile; then
            sudo fallocate -l 4G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          fi

      - name: Install build tools (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # MSYS2 bash provides make natively; only add usr/bin for POSIX tools
          # Do NOT add msys64/mingw64/bin - Go CGo uses C:\mingw64 and cmake must match
          echo "C:/msys64/usr/bin" >> $GITHUB_PATH

      # キャッシュキーに bridge ファイルを含め restore-keys は設定しない。
      # restore-keys によるフォールバックは cmake の .built 番人ファイルが存在する
      # 古いキャッシュを復元し cmake がスキップされ古いヘッダーでビルドが壊れる
      # 原因となるため使用しない。
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            meet-translator/server/vendor
          key: ${{ runner.os }}-${{ runner.arch }}-deps-cpu-${{ hashFiles('meet-translator/server/Makefile', 'meet-translator/server/llama_bridge.cpp', 'meet-translator/server/llama_bridge.h', 'meet-translator/server/whisper_bridge.cpp', 'meet-translator/server/whisper_bridge.h') }}

      # whisper.cpp + llama.cpp のビルド (CGo ヘッダーが必要)
      - name: Build native dependencies
        working-directory: meet-translator/server
        run: make deps GPU=cpu

      - name: Run tests
        working-directory: meet-translator/server
        run: make test GPU=cpu

      - name: Check binary builds
        working-directory: meet-translator/server
        run: make build GPU=cpu
