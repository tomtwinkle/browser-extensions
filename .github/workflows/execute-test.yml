name: Execute Test

on:
  pull_request:
    branches: ["**"]

# ──────────────────────────────────────────────────────────────────────────────
# ビルド環境と実行環境を完全に分離した統合テスト。
#
#  build   ジョブ: ソースからバイナリをビルドしアーティファクトにアップロード
#  execute ジョブ: checkout/Go/cmake 一切なしのクリーンなランナーで
#                  バイナリをダウンロードして起動・HTTP エンドポイントを検証
#
# execute ジョブが通ること = ビルド成果物が外部ランタイム依存なしで動作すること。
# モデルファイルはキャッシュして再ダウンロードを回避する。
# ──────────────────────────────────────────────────────────────────────────────

defaults:
  run:
    shell: bash

jobs:
  # ── build: ソースからバイナリをビルドしてアーティファクトとして保存 ─────────
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: ubuntu-amd64
            bin: server
          - os: ubuntu-24.04-arm
            name: ubuntu-arm64
            bin: server
          - os: macos-latest
            name: macos-arm64
            bin: server
          - os: windows-latest
            name: windows-amd64
            bin: server.exe

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: meet-translator/server/go.mod
          cache: false

      - name: Install build tools (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get install -y cmake build-essential

      # llama.cpp b8664 は多数のモデルファイルを含み大量メモリを消費するため、
      # Ubuntu ランナー (特に ARM 2-core/8GB) でスワップを追加して OOM を防ぐ。
      - name: Add swap space (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          if ! swapon --show | grep -q /swapfile; then
            sudo fallocate -l 4G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          fi

      - name: Install build tools (Windows)
        if: matrix.os == 'windows-latest'
        run: echo "C:/msys64/usr/bin" >> $GITHUB_PATH

      # Go モジュールキャッシュは部分一致でも安全
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-${{ runner.arch }}-go-${{ hashFiles('meet-translator/server/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-go-

      # vendor (llama.cpp/whisper.cpp クローン + cmake ビルド成果物) は
      # Makefile が変わったら必ず再ビルドする必要があるため restore-keys を使わない。
      # restore-keys を使うと古い llama.cpp クローンが再利用されて型サポートの不一致が起きる。
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: meet-translator/server/vendor
          key: ${{ runner.os }}-${{ runner.arch }}-vendor-${{ hashFiles('meet-translator/server/Makefile') }}

      - name: Build native dependencies
        working-directory: meet-translator/server
        run: make deps GPU=cpu

      - name: Build binary
        working-directory: meet-translator/server
        run: make build GPU=cpu

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: server-${{ matrix.name }}
          path: meet-translator/server/${{ matrix.bin }}
          retention-days: 1

  # ── execute: クリーンな別ランナーでバイナリを実行して動作を検証 ─────────────
  # checkout / Go / cmake / ビルドツール を一切インストールしない。
  # build ジョブのアーティファクト (バイナリのみ) をダウンロードして実行する。
  execute:
    name: Execute Test (${{ matrix.name }} / ${{ matrix.llama_model }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── 既存: qwen3 0.6b (軽量モデル) ──────────────────────────────────
          - os: ubuntu-latest
            name: ubuntu-amd64
            bin: server
            whisper_model: tiny
            llama_model: qwen3:0.6b-q4_k_m
          - os: ubuntu-24.04-arm
            name: ubuntu-arm64
            bin: server
            whisper_model: tiny
            llama_model: qwen3:0.6b-q4_k_m
          - os: macos-latest
            name: macos-arm64
            bin: server
            whisper_model: tiny
            llama_model: qwen3:0.6b-q4_k_m
          - os: windows-latest
            name: windows-amd64
            bin: server.exe
            whisper_model: tiny
            llama_model: qwen3:0.6b-q4_k_m
          # ── 新規: bonsai-8b (1-bit 8B, PrismML fork) ───────────────────────
          - os: ubuntu-latest
            name: ubuntu-amd64
            bin: server
            whisper_model: tiny
            llama_model: bonsai-8b
          - os: ubuntu-24.04-arm
            name: ubuntu-arm64
            bin: server
            whisper_model: tiny
            llama_model: bonsai-8b
          - os: macos-latest
            name: macos-arm64
            bin: server
            whisper_model: tiny
            llama_model: bonsai-8b
          - os: windows-latest
            name: windows-amd64
            bin: server.exe
            whisper_model: tiny
            llama_model: bonsai-8b

    env:
      WHISPER_MODEL: ${{ matrix.whisper_model }}
      LLAMA_MODEL: ${{ matrix.llama_model }}

    steps:
      # ── ビルド成果物 (バイナリのみ) をダウンロード ──────────────────────────
      - name: Download binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: server-${{ matrix.name }}
          path: server

      - name: Make binary executable (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x server/${{ matrix.bin }}

      # ── モデルキャッシュ ──────────────────────────────────────────────────
      # キーにモデル名を固定する。モデル URL が変わった場合は v番号を上げる。
      - name: Set model cache path
        run: echo "MODEL_CACHE_DIR=$GITHUB_WORKSPACE/model-cache" >> $GITHUB_ENV

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ github.workspace }}/model-cache
          key: models-v1-${{ runner.os }}-${{ runner.arch }}-whisper-${{ matrix.whisper_model }}-${{ matrix.llama_model }}

      # ── テスト用音声ファイルの生成 ─────────────────────────────────────────
      # Node.js で 1 秒の無音 WAV を生成する (全ランナーで利用可能)。
      # 無音入力では whisper が空文字を返すため llama 翻訳はスキップされる。
      # → 目的はサーバーの起動 (両モデルのロード) と HTTP 応答形式の検証。
      - name: Generate test audio (1s silence, 16kHz mono WAV)
        run: |
          node - <<'JSEOF'
          const fs = require('node:fs');
          const sampleRate = 16000;
          const numSamples = sampleRate;
          const dataBytes = numSamples * 2;
          const buffer = Buffer.alloc(44 + dataBytes);
          buffer.write('RIFF', 0, 'ascii');
          buffer.writeUInt32LE(36 + dataBytes, 4);
          buffer.write('WAVE', 8, 'ascii');
          buffer.write('fmt ', 12, 'ascii');
          buffer.writeUInt32LE(16, 16);
          buffer.writeUInt16LE(1, 20);
          buffer.writeUInt16LE(1, 22);
          buffer.writeUInt32LE(sampleRate, 24);
          buffer.writeUInt32LE(sampleRate * 2, 28);
          buffer.writeUInt16LE(2, 32);
          buffer.writeUInt16LE(16, 34);
          buffer.write('data', 36, 'ascii');
          buffer.writeUInt32LE(dataBytes, 40);
          fs.writeFileSync('test_silence.wav', buffer);
          console.log(`Generated test_silence.wav: ${fs.statSync('test_silence.wav').size} bytes`);
          JSEOF

      # ── llama モデルの事前ダウンロード ───────────────────────────────────
      # 大きなモデル (例: bonsai-8b ~1.15GB) はダウンロードに時間がかかるため、
      # サーバー起動前に明示的にダウンロードする。
      # キャッシュがある場合はスキップ。タイムアウトは最大 20 分。
      - name: Pre-download llama model
        timeout-minutes: 20
        run: |
          # model_manager.go の resolveLlamaModel と同じパスにダウンロードする
          # mutable な resolve/main は supply-chain 上避け、固定 revision に pin する
          case "${{ matrix.llama_model }}" in
            bonsai-8b)
              DEST="$MODEL_CACHE_DIR/llama/Bonsai-8B.gguf"
              URL="https://huggingface.co/prism-ml/Bonsai-8B-gguf/resolve/f708df14d9e83594af9564fb4c9c345a571c481c/Bonsai-8B.gguf"
              ;;
            *)
              # その他のモデルはサーバー起動時に自動ダウンロード
              echo "Model '${{ matrix.llama_model }}' will be downloaded by server on startup"
              exit 0
              ;;
          esac
          if [ -f "$DEST" ]; then
            echo "Cache hit: $DEST"
          else
            mkdir -p "$(dirname "$DEST")"
            echo "Downloading ${{ matrix.llama_model }}..."
            curl -L --retry 3 --retry-delay 5 --progress-bar -o "$DEST" "$URL"
            echo "Download complete: $(du -sh "$DEST" | cut -f1)"
          fi

      # ── サーバーを起動 ────────────────────────────────────────────────────
      # モデルは事前ダウンロード済みのためキャッシュを使用。
      - name: Start server
        run: |
          ./server/${{ matrix.bin }} \
            --llama-gpu-layers 0 \
            --whisper-gpu-layers 0 \
            > server.log 2>&1 &
          echo $! > server.pid
          echo "Server started (PID: $(cat server.pid))"

      # ── サーバー起動を待機 (最大 5 分) ───────────────────────────────────
      - name: Wait for server ready
        run: |
          echo "Waiting for server to become ready (up to 5 minutes)..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:7070/health > /dev/null 2>&1; then
              echo "Server ready (attempt ${i}/60)"
              exit 0
            fi
            echo "  attempt ${i}/60..."
            sleep 5
          done
          echo "ERROR: server failed to start within 5 minutes"
          exit 1

      # ── GET /health ───────────────────────────────────────────────────────
      - name: Test GET /health
        run: |
          curl -sf http://localhost:7070/health -o health.json
          cat health.json
          node - <<'JSEOF'
          const fs = require('node:fs');
          const data = JSON.parse(fs.readFileSync('health.json', 'utf8'));
          if (data.status !== 'ok') {
            throw new Error(`want status=ok, got: ${JSON.stringify(data)}`);
          }
          console.log('PASS: /health returned status=ok');
          JSEOF

      # ── POST /transcribe-and-translate ────────────────────────────────────
      # 無音 WAV を送信 → transcription/translation フィールドを持つ JSON が返ること
      - name: Test POST /transcribe-and-translate
        run: |
          curl -sf -X POST http://localhost:7070/transcribe-and-translate \
            -F "audio=@test_silence.wav" \
            -F "target_lang=ja" \
            -o translate.json
          cat translate.json
          node - <<'JSEOF'
          const fs = require('node:fs');
          const data = JSON.parse(fs.readFileSync('translate.json', 'utf8'));
          if (!Object.hasOwn(data, 'transcription')) {
            throw new Error(`missing transcription field: ${JSON.stringify(data)}`);
          }
          if (!Object.hasOwn(data, 'translation')) {
            throw new Error(`missing translation field: ${JSON.stringify(data)}`);
          }
          if (typeof data.transcription !== 'string') {
            throw new Error(`transcription must be string: ${JSON.stringify(data)}`);
          }
          if (typeof data.translation !== 'string') {
            throw new Error(`translation must be string: ${JSON.stringify(data)}`);
          }
          console.log('PASS: /transcribe-and-translate returned valid JSON:', data);
          JSEOF

      # ── クリーンアップ ────────────────────────────────────────────────────
      - name: Stop server
        if: always()
        run: kill "$(cat server.pid)" 2>/dev/null || true

      - name: Show server log
        if: always()
        run: cat server.log 2>/dev/null || true
