name: Execute Test

on:
  pull_request:
    branches: ["**"]

# ──────────────────────────────────────────────────────────────────────────────
# ビルド環境と実行環境を完全に分離した統合テスト。
#
#  build   ジョブ: ソースからバイナリをビルドしアーティファクトにアップロード
#  execute ジョブ: checkout/Go/cmake 一切なしのクリーンなランナーで
#                  バイナリをダウンロードして起動・HTTP エンドポイントを検証
#
# execute ジョブが通ること = ビルド成果物がクリーンなランナー上で動作すること。
# Python-backed ASR と Apple Silicon の MLX ケースのみ、必要な実行時依存
# (Python / ffmpeg / pip packages) を追加で入れる。
# モデルファイルはキャッシュして再ダウンロードを回避する。
# ──────────────────────────────────────────────────────────────────────────────

defaults:
  run:
    shell: bash

jobs:
  # ── build: ソースからバイナリをビルドしてアーティファクトとして保存 ─────────
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: ubuntu-amd64
            bin: server
          - os: ubuntu-24.04-arm
            name: ubuntu-arm64
            bin: server
          - os: macos-latest
            name: macos-arm64
            bin: server
          - os: windows-latest
            name: windows-amd64
            bin: server.exe

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: meet-translator/server/go.mod
          cache: false

      - name: Install build tools (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get install -y cmake build-essential

      # pin している llama.cpp checkout は多数のモデルファイルを含み大量メモリを消費するため、
      # Ubuntu ランナー (特に ARM 2-core/8GB) でスワップを追加して OOM を防ぐ。
      - name: Add swap space (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          if ! swapon --show | grep -q /swapfile; then
            sudo fallocate -l 4G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          fi

      - name: Install build tools (Windows)
        if: matrix.os == 'windows-latest'
        run: echo "C:/msys64/usr/bin" >> $GITHUB_PATH

      # Go モジュールキャッシュは部分一致でも安全
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-${{ runner.arch }}-go-${{ hashFiles('meet-translator/server/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-go-

      # vendor (llama.cpp/whisper.cpp クローン + cmake ビルド成果物) は
      # Makefile が変わったら必ず再ビルドする必要があるため restore-keys を使わない。
      # restore-keys を使うと古い llama.cpp クローンが再利用されて型サポートの不一致が起きる。
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: meet-translator/server/vendor
          key: ${{ runner.os }}-${{ runner.arch }}-vendor-${{ hashFiles('meet-translator/server/Makefile') }}

      - name: Build native dependencies
        working-directory: meet-translator/server
        run: make deps GPU=cpu

      - name: Build binary
        working-directory: meet-translator/server
        run: make build GPU=cpu

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: server-${{ matrix.name }}
          path: meet-translator/server/${{ matrix.bin }}
          retention-days: 1

  # ── execute: クリーンな別ランナーでバイナリを実行して動作を検証 ─────────────
  # checkout / Go / cmake / ビルドツール は入れず、
  # Python-backed ASR ケースのみ実行時依存を追加セットアップする。
  # build ジョブのアーティファクト (バイナリのみ) をダウンロードして実行する。
  execute:
    name: Execute Test (${{ matrix.name }} / ${{ matrix.whisper_model }} / ${{ matrix.llama_model }}${{ matrix.scenario && format(' / {0}', matrix.scenario) || '' }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── 既存: qwen3 0.6b (軽量モデル) ──────────────────────────────────
          - os: ubuntu-latest
            name: ubuntu-amd64
            bin: server
            whisper_model: tiny
            llama_model: qwen3:0.6b-q4_k_m
          - os: ubuntu-24.04-arm
            name: ubuntu-arm64
            bin: server
            whisper_model: tiny
            llama_model: qwen3:0.6b-q4_k_m
          - os: macos-latest
            name: macos-arm64
            bin: server
            whisper_model: tiny
            llama_model: qwen3:0.6b-q4_k_m
          - os: windows-latest
            name: windows-amd64
            bin: server.exe
            whisper_model: tiny
            llama_model: qwen3:0.6b-q4_k_m
          # ── 新規: bonsai-8b (1-bit 8B, PrismML fork) ───────────────────────
          - os: ubuntu-latest
            name: ubuntu-amd64
            bin: server
            whisper_model: tiny
            llama_model: bonsai-8b
          - os: ubuntu-24.04-arm
            name: ubuntu-arm64
            bin: server
            whisper_model: tiny
            llama_model: bonsai-8b
          - os: macos-latest
            name: macos-arm64
            bin: server
            whisper_model: tiny
            llama_model: bonsai-8b
          # ── 新規: MLX + whisper Metal success path (Apple Silicon only) ────────
          # MLX runtime が揃っている通常ケースで、MLX LLM と whisper Metal が
          # 両方とも有効なまま正常起動・疎通できることを検証する。
          - os: macos-latest
            name: macos-arm64
            bin: server
            whisper_model: tiny
            llama_model: bonsai-8b
            scenario: mlx-metal-success
            enable_whisper_gpu: true
          # ── 新規: MLX runtime missing path should fail cleanly (Apple Silicon only) ─
          # Apple Silicon では MLX worker を whisper.cpp より先に起動するため、
          # mlx-lm がなくても GGML_ASSERT / SIGABRT に落ちず明示エラーで終了することを検証する。
          - os: macos-latest
            name: macos-arm64
            bin: server
            whisper_model: tiny
            llama_model: bonsai-8b
            scenario: mlx-runtime-missing
            enable_whisper_gpu: true
            python_launcher: python
            expect_startup_failure: true
            expected_startup_error: "MLX worker failed to initialize: No module named 'mlx_lm'"
          - os: windows-latest
            name: windows-amd64
            bin: server.exe
            whisper_model: tiny
            llama_model: bonsai-8b
          # ── 新規: MLX Bonsai smoke tests (Apple Silicon only) ─────────────────
          # macOS の bonsai-8b は既存ケースで MLX 経路を通るため、
          # ここでは追加した MLX 専用 Bonsai alias を検証する。
          - os: macos-latest
            name: macos-arm64
            bin: server
            whisper_model: tiny
            llama_model: bonsai-4b
          - os: macos-latest
            name: macos-arm64
            bin: server
            whisper_model: tiny
            llama_model: bonsai-1.7b
          # ── 新規: 追加 LLM アーキテクチャ smoke test (Linux only) ───────────────
          - os: ubuntu-latest
            name: ubuntu-amd64
            bin: server
            whisper_model: tiny
            llama_model: gemma4:e2b-q4_k_m
          # ── 新規: ASR backend smoke tests (Linux only) ─────────────────────────
          - os: ubuntu-latest
            name: ubuntu-amd64
            bin: server
            whisper_model: kotoba-whisper-q5_0
            llama_model: qwen3:0.6b-q4_k_m
          - os: ubuntu-latest
            name: ubuntu-amd64
            bin: server
            whisper_model: sensevoice
            llama_model: qwen3:0.6b-q4_k_m
          - os: ubuntu-latest
            name: ubuntu-amd64
            bin: server
            whisper_model: whisperx:small
            llama_model: qwen3:0.6b-q4_k_m

    env:
      WHISPER_MODEL: ${{ matrix.whisper_model }}
      LLAMA_MODEL: ${{ matrix.llama_model }}
      ASR_PYTHON_DEVICE: cpu

    steps:
      # ── ビルド成果物 (バイナリのみ) をダウンロード ──────────────────────────
      - name: Download binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: server-${{ matrix.name }}
          path: server

      - name: Make binary executable (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x server/${{ matrix.bin }}

      # ── モデルキャッシュ ──────────────────────────────────────────────────
      # キーにモデル名を固定する。モデル URL が変わった場合は v番号を上げる。
      - name: Set model cache path
        run: echo "MODEL_CACHE_DIR=$GITHUB_WORKSPACE/model-cache" >> $GITHUB_ENV

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ github.workspace }}/model-cache
          key: models-v1-${{ runner.os }}-${{ runner.arch }}-whisper-${{ matrix.whisper_model }}-${{ matrix.llama_model }}

      - name: Set Python ASR cache paths
        if: startsWith(matrix.whisper_model, 'sensevoice') || startsWith(matrix.whisper_model, 'whisperx')
        run: |
          echo "HF_HOME=$GITHUB_WORKSPACE/hf-home" >> $GITHUB_ENV
          echo "MODELSCOPE_CACHE=$GITHUB_WORKSPACE/modelscope-cache" >> $GITHUB_ENV

      - name: Set Python MLX cache path
        if: matrix.os == 'macos-latest'
        run: |
          echo "HF_HOME=$GITHUB_WORKSPACE/hf-home" >> $GITHUB_ENV

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        if: startsWith(matrix.whisper_model, 'sensevoice') || startsWith(matrix.whisper_model, 'whisperx')
        with:
          path: |
            ${{ github.workspace }}/hf-home
            ${{ github.workspace }}/modelscope-cache
          key: py-asr-cache-v1-${{ runner.os }}-${{ runner.arch }}-${{ matrix.whisper_model }}

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        if: matrix.os == 'macos-latest'
        with:
          path: ${{ github.workspace }}/hf-home
          key: py-mlx-cache-v1-${{ runner.os }}-${{ runner.arch }}-${{ matrix.llama_model }}

      - name: Setup Python (Python-backed ASR / MLX only)
        if: startsWith(matrix.whisper_model, 'sensevoice') || startsWith(matrix.whisper_model, 'whisperx') || matrix.os == 'macos-latest'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install ASR runtime dependencies
        if: startsWith(matrix.whisper_model, 'sensevoice') || startsWith(matrix.whisper_model, 'whisperx')
        run: |
          python -m pip install --upgrade pip
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi
          case "${{ matrix.whisper_model }}" in
            sensevoice*)
              python -m pip install torch torchaudio funasr modelscope
              ;;
            whisperx*)
              python -m pip install torch whisperx
              ;;
          esac

      - name: Install MLX runtime dependencies
        if: matrix.os == 'macos-latest' && matrix.expect_startup_failure != true
        run: |
          python -m pip install --upgrade pip
          python -m pip install mlx-lm
          echo "LLM_PYTHON_BIN=$(command -v python)" >> $GITHUB_ENV

      - name: Warm MLX model cache
        if: matrix.os == 'macos-latest' && matrix.expect_startup_failure != true
        timeout-minutes: 20
        run: |
          python - <<'PY'
          import os
          from mlx_lm import load

          model = os.environ["LLAMA_MODEL"]
          aliases = {
              "bonsai-8b": "prism-ml/Ternary-Bonsai-8B-mlx-2bit",
              "bonsai-4b": "prism-ml/Ternary-Bonsai-4B-mlx-2bit",
              "bonsai-1.7b": "prism-ml/Ternary-Bonsai-1.7B-mlx-2bit",
              "qwen2.5:7b-instruct-q4_k_m": "mlx-community/Qwen2.5-7B-Instruct-4bit",
              "qwen2.5:14b-instruct-q4_k_m": "mlx-community/Qwen2.5-14B-Instruct-4bit",
              "qwen3:0.6b-q4_k_m": "mlx-community/Qwen3-0.6B-4bit",
              "qwen3:1.7b-q4_k_m": "mlx-community/Qwen3-1.7B-4bit",
              "qwen3:4b-q4_k_m": "mlx-community/Qwen3-4B-4bit",
              "qwen3:8b-q4_k_m": "mlx-community/Qwen3-8B-4bit",
              "qwen3.5:0.8b-q4_k_m": "mlx-community/Qwen3.5-0.8B-MLX-4bit",
              "qwen3.5:2b-q4_k_m": "mlx-community/Qwen3.5-2B-MLX-4bit",
              "qwen3.5:4b-q4_k_m": "mlx-community/Qwen3.5-4B-MLX-4bit",
              "qwen3.5:9b-q4_k_m": "mlx-community/Qwen3.5-9B-MLX-4bit",
              "calm3:22b-q4_k_m": "mlx-community/calm3-22b-chat-4bit",
              "gemma4:e2b-q4_k_m": "mlx-community/gemma-4-e2b-it-4bit",
              "gemma4:e4b-q4_k_m": "mlx-community/gemma-4-e4b-it-4bit",
              "gemma4:26b-q4_k_m": "mlx-community/gemma-4-26b-a4b-it-4bit",
          }
          model_ref = aliases.get(model)
          if model_ref is None and "/" in model:
              model_ref = model
          if model_ref is None:
              print(f"Skipping MLX warmup for {model}: no known MLX variant")
              raise SystemExit(0)
          print(f"Warming MLX cache for {model_ref}")
          load(model_ref)
          print("MLX cache ready")
          PY

      # ── テスト用音声ファイルの生成 ─────────────────────────────────────────
      # Node.js で 1 秒の無音 WAV を生成する (全ランナーで利用可能)。
      # 無音入力では whisper が空文字を返すため llama 翻訳はスキップされる。
      # → 目的はサーバーの起動 (両モデルのロード) と HTTP 応答形式の検証。
      - name: Generate test audio (1s silence, 16kHz mono WAV)
        run: |
          node - <<'JSEOF'
          const fs = require('node:fs');
          const sampleRate = 16000;
          const numSamples = sampleRate;
          const dataBytes = numSamples * 2;
          const buffer = Buffer.alloc(44 + dataBytes);
          buffer.write('RIFF', 0, 'ascii');
          buffer.writeUInt32LE(36 + dataBytes, 4);
          buffer.write('WAVE', 8, 'ascii');
          buffer.write('fmt ', 12, 'ascii');
          buffer.writeUInt32LE(16, 16);
          buffer.writeUInt16LE(1, 20);
          buffer.writeUInt16LE(1, 22);
          buffer.writeUInt32LE(sampleRate, 24);
          buffer.writeUInt32LE(sampleRate * 2, 28);
          buffer.writeUInt16LE(2, 32);
          buffer.writeUInt16LE(16, 34);
          buffer.write('data', 36, 'ascii');
          buffer.writeUInt32LE(dataBytes, 40);
          fs.writeFileSync('test_silence.wav', buffer);
          console.log(`Generated test_silence.wav: ${fs.statSync('test_silence.wav').size} bytes`);
          JSEOF

      - name: Configure Python launcher
        if: matrix.python_launcher != ''
        run: echo "MEET_TRANSLATOR_PYTHON_LAUNCHER=${{ matrix.python_launcher }}" >> $GITHUB_ENV

      # ── llama モデルの事前ダウンロード ───────────────────────────────────
      # 大きなモデル (例: bonsai-8b / gemma4:e2b-q4_k_m) はダウンロードに時間がかかるため、
      # サーバー起動前に明示的にダウンロードする。
      # キャッシュがある場合はスキップ。タイムアウトは最大 20 分。
      - name: Pre-download llama model
        timeout-minutes: 20
        run: |
          # model_manager.go の resolveLlamaModel と同じパスにダウンロードする
          # mutable な resolve/main は supply-chain 上避け、固定 revision に pin する
          if [ "${{ runner.os }}" = "macOS" ]; then
            case "${{ matrix.llama_model }}" in
              bonsai-8b|bonsai-4b|bonsai-1.7b|prism-ml/Ternary-Bonsai-*|qwen2.5:7b-instruct-q4_k_m|qwen2.5:14b-instruct-q4_k_m|qwen3:0.6b-q4_k_m|qwen3:1.7b-q4_k_m|qwen3:4b-q4_k_m|qwen3:8b-q4_k_m|qwen3.5:0.8b-q4_k_m|qwen3.5:2b-q4_k_m|qwen3.5:4b-q4_k_m|qwen3.5:9b-q4_k_m|calm3:22b-q4_k_m|gemma4:e2b-q4_k_m|gemma4:e4b-q4_k_m|gemma4:26b-q4_k_m|mlx-community/*)
                echo "macOS uses the MLX worker for '${{ matrix.llama_model }}'; cache is warmed in the MLX step"
                exit 0
                ;;
            esac
          fi
          case "${{ matrix.llama_model }}" in
            bonsai-8b)
              DEST="$MODEL_CACHE_DIR/llama/Bonsai-8B.gguf"
              URL="https://huggingface.co/prism-ml/Bonsai-8B-gguf/resolve/f708df14d9e83594af9564fb4c9c345a571c481c/Bonsai-8B.gguf"
              ;;
            qwen3:0.6b-q4_k_m)
              DEST="$MODEL_CACHE_DIR/llama/Qwen3-0.6B-Q4_K_M.gguf"
              URL="https://huggingface.co/unsloth/Qwen3-0.6B-GGUF/resolve/50968a4468ef4233ed78cd7c3de230dd1d61a56b/Qwen3-0.6B-Q4_K_M.gguf"
              ;;
            gemma4:e2b-q4_k_m)
              DEST="$MODEL_CACHE_DIR/llama/google_gemma-4-E2B-it-Q4_K_M.gguf"
              URL="https://huggingface.co/bartowski/google_gemma-4-E2B-it-GGUF/resolve/2b078a823b3180e03bcbe6c2dfc96afde936857b/google_gemma-4-E2B-it-Q4_K_M.gguf"
              ;;
            *)
              # その他のモデルはサーバー起動時に自動ダウンロード
              echo "Model '${{ matrix.llama_model }}' will be downloaded by server on startup"
              exit 0
              ;;
          esac
          if [ -f "$DEST" ]; then
            echo "Cache hit: $DEST"
          else
            mkdir -p "$(dirname "$DEST")"
            echo "Downloading ${{ matrix.llama_model }}..."
            curl -L --retry 3 --retry-delay 5 --progress-bar -o "$DEST" "$URL"
            echo "Download complete: $(du -sh "$DEST" | cut -f1)"
          fi

      - name: Pre-download whisper model
        timeout-minutes: 20
        run: |
          case "${{ matrix.whisper_model }}" in
            kotoba-whisper-q5_0)
              DEST="$MODEL_CACHE_DIR/whisper/ggml-kotoba-whisper-v2.0-q5_0.bin"
              URL="https://huggingface.co/kotoba-tech/kotoba-whisper-v2.0-ggml/resolve/e3a0cf6a62b95911703cfb97d819292e058f12c3/ggml-kotoba-whisper-v2.0-q5_0.bin"
              ;;
            *)
              echo "Model '${{ matrix.whisper_model }}' will be downloaded by server on startup"
              exit 0
              ;;
          esac
          if [ -f "$DEST" ]; then
            echo "Cache hit: $DEST"
          else
            mkdir -p "$(dirname "$DEST")"
            echo "Downloading ${{ matrix.whisper_model }}..."
            curl -L --retry 3 --retry-delay 5 --progress-bar -o "$DEST" "$URL"
            echo "Download complete: $(du -sh "$DEST" | cut -f1)"
          fi

      - name: Warm SenseVoice ASR cache
        if: startsWith(matrix.whisper_model, 'sensevoice')
        timeout-minutes: 20
        run: |
          MODEL_SPEC="${{ matrix.whisper_model }}"
          case "$MODEL_SPEC" in
            sensevoice|sensevoice-small)
              export MODEL_REF="iic/SenseVoiceSmall"
              ;;
            sensevoice:*)
              export MODEL_REF="${MODEL_SPEC#sensevoice:}"
              ;;
            *)
              echo "Skipping SenseVoice warmup for $MODEL_SPEC"
              exit 0
              ;;
          esac
          python - <<'PY'
          import os
          from funasr import AutoModel

          model_ref = os.environ["MODEL_REF"]
          device = os.environ.get("ASR_PYTHON_DEVICE", "cpu")
          print(f"Warming SenseVoice cache for {model_ref} on {device}")
          AutoModel(
              model=model_ref,
              vad_model="fsmn-vad",
              vad_kwargs={"max_single_segment_time": 30000},
              device=device,
          )
          print("SenseVoice cache ready")
          PY

      # ── サーバーを起動 ────────────────────────────────────────────────────
      # モデルは事前ダウンロード済みのためキャッシュを使用。
      - name: Start server
        run: |
          (
            set +e
            if [ "${{ matrix.enable_whisper_gpu == true }}" = "true" ]; then
              ./server/${{ matrix.bin }} \
                --llama-gpu-layers 0
            else
              ./server/${{ matrix.bin }} \
                --llama-gpu-layers 0 \
                --whisper-gpu-layers 0
            fi
            echo $? > server.exit
          ) > server.log 2>&1 &
          echo $! > server.pid
          echo "Server started (PID: $(cat server.pid))"

      # ── サーバー起動を待機 (最大 5 分) ───────────────────────────────────
      - name: Wait for server ready
        if: matrix.expect_startup_failure != true
        run: |
          attempts=60
          if [ "${{ runner.os }}" = "macOS" ]; then
            attempts=120
          fi
          case "${{ matrix.whisper_model }}" in
            kotoba-whisper*|sensevoice*|whisperx*) attempts=120 ;;
          esac
          echo "Waiting for server to become ready (up to $((attempts * 5 / 60)) minutes)..."
          for i in $(seq 1 "$attempts"); do
            if curl -sf http://localhost:7070/health > /dev/null 2>&1; then
              echo "Server ready (attempt ${i}/${attempts})"
              exit 0
            fi
            echo "  attempt ${i}/${attempts}..."
            sleep 5
          done
          echo "ERROR: server failed to start within $((attempts * 5 / 60)) minutes"
          exit 1

      - name: Verify MLX + Metal startup success
        if: matrix.scenario == 'mlx-metal-success'
        run: |
          attempts=30
          for i in $(seq 1 "$attempts"); do
            if grep -F 'llama ready: bonsai-8b (mlx)' server.log > /dev/null && \
               grep -F 'asr ready: tiny (whisper.cpp)' server.log > /dev/null && \
               grep -E 'whisper_init_with_params_no_state: use gpu[[:space:]]+=[[:space:]]+1' server.log > /dev/null; then
              echo "PASS: MLX LLM and whisper Metal both initialized successfully"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: expected MLX + whisper Metal startup markers not found"
          cat server.log
          exit 1

      - name: Verify expected startup failure
        if: matrix.expect_startup_failure == true
        run: |
          attempts=120
          echo "Waiting for expected startup failure (up to $((attempts * 5 / 60)) minutes)..."
          for i in $(seq 1 "$attempts"); do
            if [ -f server.exit ]; then
              break
            fi
            if curl -sf http://localhost:7070/health > /dev/null 2>&1; then
              echo "ERROR: server became healthy but startup failure was expected"
              exit 1
            fi
            echo "  attempt ${i}/${attempts}..."
            sleep 5
          done

          if [ ! -f server.exit ]; then
            echo "ERROR: server did not exit within $((attempts * 5 / 60)) minutes"
            exit 1
          fi

          status="$(cat server.exit)"
          echo "Server exit status: $status"
          if [ "$status" = "0" ]; then
            echo "ERROR: server exited successfully but failure was expected"
            exit 1
          fi

          if ! grep -F "${{ matrix.expected_startup_error }}" server.log > /dev/null; then
            echo "ERROR: expected startup error not found in server.log"
            exit 1
          fi

          if grep -E 'GGML_ASSERT|SIGABRT' server.log > /dev/null; then
            echo "ERROR: startup failure regressed to an abort"
            exit 1
          fi

          echo "PASS: startup failed cleanly with the expected MLX dependency error"

      # ── GET /health ───────────────────────────────────────────────────────
      - name: Test GET /health
        if: matrix.expect_startup_failure != true
        run: |
          curl -sf http://localhost:7070/health -o health.json
          cat health.json
          node - <<'JSEOF'
          const fs = require('node:fs');
          const data = JSON.parse(fs.readFileSync('health.json', 'utf8'));
          if (data.status !== 'ok') {
            throw new Error(`want status=ok, got: ${JSON.stringify(data)}`);
          }
          console.log('PASS: /health returned status=ok');
          JSEOF

      # ── POST /transcribe-and-translate ────────────────────────────────────
      # 無音 WAV を送信 → transcription/translation フィールドを持つ JSON が返ること
      - name: Test POST /transcribe-and-translate
        if: matrix.expect_startup_failure != true
        run: |
          curl -sf -X POST http://localhost:7070/transcribe-and-translate \
            -F "audio=@test_silence.wav" \
            -F "target_lang=ja" \
            -o translate.json
          cat translate.json
          node - <<'JSEOF'
          const fs = require('node:fs');
          const data = JSON.parse(fs.readFileSync('translate.json', 'utf8'));
          if (!Object.hasOwn(data, 'transcription')) {
            throw new Error(`missing transcription field: ${JSON.stringify(data)}`);
          }
          if (!Object.hasOwn(data, 'translation')) {
            throw new Error(`missing translation field: ${JSON.stringify(data)}`);
          }
          if (typeof data.transcription !== 'string') {
            throw new Error(`transcription must be string: ${JSON.stringify(data)}`);
          }
          if (typeof data.translation !== 'string') {
            throw new Error(`translation must be string: ${JSON.stringify(data)}`);
          }
          console.log('PASS: /transcribe-and-translate returned valid JSON:', data);
          JSEOF

      # ── クリーンアップ ────────────────────────────────────────────────────
      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" 2>/dev/null || true
          fi

      - name: Show server log
        if: always()
        run: cat server.log 2>/dev/null || true
