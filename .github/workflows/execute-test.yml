name: Execute Test

on:
  pull_request:
    branches: ["**"]

# ──────────────────────────────────────────────────────────────────────────────
# クリーンな環境でサーバーバイナリをビルド・起動し、
# 実際のモデルをロードして HTTP エンドポイントの動作を検証する統合テスト。
#
# テスト対象モデル (最小サイズを選択して CI を高速化):
#   WHISPER_MODEL: tiny             ~39 MB
#   LLAMA_MODEL:   qwen3:0.6b-q4_k_m ~400 MB
#
# サーバーが正常に起動 = whisper/llama 両モデルのロード成功を意味する。
# ──────────────────────────────────────────────────────────────────────────────

defaults:
  run:
    shell: bash

jobs:
  execute-test:
    name: Execute Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: ubuntu-amd64
            bin: meet-translator-server
          - os: ubuntu-24.04-arm
            name: ubuntu-arm64
            bin: meet-translator-server
          - os: macos-latest
            name: macos-arm64
            bin: meet-translator-server
          - os: windows-latest
            name: windows-amd64
            bin: meet-translator-server.exe

    env:
      WHISPER_MODEL: tiny
      LLAMA_MODEL: qwen3:0.6b-q4_k_m

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: meet-translator/server/go.mod
          cache: false

      - name: Install build tools (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get install -y cmake build-essential

      - name: Install build tools (Windows)
        if: matrix.os == 'windows-latest'
        run: echo "C:/msys64/usr/bin" >> $GITHUB_PATH

      # ── ビルドキャッシュ (native deps + Go modules) ───────────────────────
      # restore-keys で test ジョブのキャッシュも再利用できるようにする
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            meet-translator/server/vendor
          key: ${{ runner.os }}-${{ runner.arch }}-execute-${{ hashFiles('meet-translator/server/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-execute-
            ${{ runner.os }}-${{ runner.arch }}-deps-

      # ── モデルキャッシュ ──────────────────────────────────────────────────
      # キーにモデル名を固定する。モデル URL が変わった場合は v番号を上げる。
      - name: Set model cache path
        run: echo "MODEL_CACHE_DIR=$GITHUB_WORKSPACE/.model-cache" >> $GITHUB_ENV

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ github.workspace }}/.model-cache
          key: models-v1-${{ runner.os }}-${{ runner.arch }}-whisper-tiny-qwen3-0.6b-q4_k_m

      # ── ビルド ────────────────────────────────────────────────────────────
      - name: Build native dependencies
        working-directory: meet-translator/server
        run: make deps GPU=cpu

      - name: Build binary
        working-directory: meet-translator/server
        run: make build GPU=cpu

      # ── テスト用音声ファイルの生成 ─────────────────────────────────────────
      # Python で 1 秒の無音 WAV を生成する (全プラットフォームで利用可能)。
      # 無音入力では whisper が空文字を返すため、llama 翻訳は呼ばれない。
      # → 目的はサーバーの起動 (両モデルのロード) と HTTP 応答の検証。
      - name: Generate test audio (1s silence, 16kHz mono WAV)
        run: |
          python3 - <<'PYEOF'
          import wave, struct, os
          sample_rate = 16000
          num_samples = sample_rate  # 1 秒
          with wave.open('test_silence.wav', 'wb') as f:
              f.setnchannels(1)
              f.setsampwidth(2)
              f.setframerate(sample_rate)
              f.writeframes(struct.pack('<' + 'h' * num_samples, *([0] * num_samples)))
          print(f"Generated test_silence.wav: {os.path.getsize('test_silence.wav')} bytes")
          PYEOF

      # ── サーバーを起動 ────────────────────────────────────────────────────
      # 初回実行時はモデルをダウンロード; 2 回目以降はキャッシュを使用。
      - name: Start server
        run: |
          ./meet-translator/server/${{ matrix.bin }} \
            --llama-gpu-layers 0 \
            --whisper-gpu-layers 0 \
            > server.log 2>&1 &
          echo $! > server.pid
          echo "Server started (PID: $(cat server.pid))"

      # ── サーバー起動を待機 (最大 5 分) ───────────────────────────────────
      - name: Wait for server ready
        run: |
          echo "Waiting for server to become ready (up to 5 minutes)..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:7070/health > /dev/null 2>&1; then
              echo "Server ready (attempt ${i}/60)"
              exit 0
            fi
            echo "  attempt ${i}/60..."
            sleep 5
          done
          echo "ERROR: server failed to start within 5 minutes"
          exit 1

      # ── GET /health ───────────────────────────────────────────────────────
      - name: Test GET /health
        run: |
          curl -sf http://localhost:7070/health -o health.json
          cat health.json
          python3 -c "
          import json
          d = json.load(open('health.json'))
          assert d.get('status') == 'ok', f'want status=ok, got: {d}'
          print('PASS: /health returned status=ok')
          "

      # ── POST /transcribe-and-translate ────────────────────────────────────
      # 無音 WAV を送信 → transcription/translation フィールドを持つ JSON が返ること
      - name: Test POST /transcribe-and-translate
        run: |
          curl -sf -X POST http://localhost:7070/transcribe-and-translate \
            -F "audio=@test_silence.wav" \
            -F "target_lang=ja" \
            -o translate.json
          cat translate.json
          python3 -c "
          import json
          d = json.load(open('translate.json'))
          assert 'transcription' in d, f'missing transcription field: {d}'
          assert 'translation' in d, f'missing translation field: {d}'
          assert isinstance(d['transcription'], str), f'transcription must be string: {d}'
          assert isinstance(d['translation'], str), f'translation must be string: {d}'
          print('PASS: /transcribe-and-translate returned valid JSON:', d)
          "

      # ── クリーンアップ ────────────────────────────────────────────────────
      - name: Stop server
        if: always()
        run: kill "$(cat server.pid)" 2>/dev/null || true

      - name: Show server log
        if: always()
        run: cat server.log 2>/dev/null || true
