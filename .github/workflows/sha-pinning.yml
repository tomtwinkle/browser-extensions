name: SHA Pinning

on:
  pull_request:
    branches: ["**"]

defaults:
  run:
    shell: bash

jobs:
  verify:
    name: Verify CI pinning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify actions and direct downloads are pinned
        run: node .github/scripts/check_ci_pinning.js
