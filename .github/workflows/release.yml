name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # tag: conventional commits を解析して version を bump し tag + release を作成
  #   feat:           → minor bump (0.1.0 → 0.2.0)
  #   fix: / others   → patch bump (0.1.0 → 0.1.1)
  #   BREAKING CHANGE → minor bump (pre-major: stay in 0.x)
  # ────────────────────────────────────────────────────────────────────────────
  tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag:   ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: v
          default_bump: patch
          initial_version: 0.1.0

      - name: Create GitHub Release
        if: steps.tag.outputs.new_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.new_tag }}" \
            --title "${{ steps.tag.outputs.new_tag }}" \
            --notes "${{ steps.tag.outputs.changelog }}" \
            --repo "${{ github.repository }}"

  # ────────────────────────────────────────────────────────────────────────────
  # build-server: server binary を各 platform でビルドして release にアタッチ
  # ────────────────────────────────────────────────────────────────────────────
  build-server:
    needs: tag
    if: needs.tag.outputs.new_tag != ''
    name: Build server (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-amd64
            gpu: cpu
          - os: ubuntu-24.04-arm
            name: linux-arm64
            gpu: cpu
          - os: macos-latest
            name: darwin-arm64
            gpu: metal
          - os: windows-latest
            name: windows-amd64
            gpu: cpu
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: meet-translator/server/go.mod
          cache: false

      - name: Install build tools (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get install -y cmake build-essential ninja-build

      - name: Install build tools (Windows)
        if: matrix.os == 'windows-latest'
        run: echo "C:/msys64/usr/bin" >> $GITHUB_PATH

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            meet-translator/server/vendor
          key: ${{ runner.os }}-${{ runner.arch }}-release-${{ hashFiles('meet-translator/server/Makefile') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-release-

      - name: Build
        working-directory: meet-translator/server
        run: make build GPU=${{ matrix.gpu }}

      - name: Archive (Unix)
        if: matrix.os != 'windows-latest'
        working-directory: meet-translator/server
        run: |
          dir=meet-translator
          mkdir -p "$dir"
          cp server "$dir/"
          tar czf "meet-translator-server-${{ matrix.name }}.tar.gz" "$dir"

      - name: Archive (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: meet-translator/server
        run: |
          dir=meet-translator
          mkdir -p "$dir"
          cp server.exe "$dir/"
          # Bundle MinGW runtime DLLs in case static linking is incomplete
          for dll in libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll; do
            dll_path=$(find /c/mingw64/bin /c/msys64/mingw64/bin -name "$dll" 2>/dev/null | head -1)
            if [ -n "$dll_path" ]; then
              cp "$dll_path" "$dir/" && echo "bundled: $dll"
            else
              echo "not found (ok if statically linked): $dll"
            fi
          done
          7z a "meet-translator-server-${{ matrix.name }}.zip" "$dir"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: server-${{ matrix.name }}
          path: |
            meet-translator/server/meet-translator-server-*.tar.gz
            meet-translator/server/meet-translator-server-*.zip

  # ────────────────────────────────────────────────────────────────────────────
  # package-extension: browser extension を zip にまとめる
  # ────────────────────────────────────────────────────────────────────────────
  package-extension:
    needs: tag
    if: needs.tag.outputs.new_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Package extension
        run: |
          cd meet-translator/extension
          zip -r ../../meet-translator-extension.zip . -x "*.DS_Store"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: extension
          path: meet-translator-extension.zip

  # ────────────────────────────────────────────────────────────────────────────
  # upload-assets: 全成果物を GitHub Release にアップロード
  # ────────────────────────────────────────────────────────────────────────────
  upload-assets:
    needs: [tag, build-server, package-extension]
    if: needs.tag.outputs.new_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.tag.outputs.new_tag }}
          REPO: ${{ github.repository }}
        run: |
          for f in artifacts/*; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --repo "$REPO" --clobber
          done
