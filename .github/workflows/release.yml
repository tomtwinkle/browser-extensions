name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # release-please: parse conventional commits → create/merge Release PR → tag
  # ────────────────────────────────────────────────────────────────────────────
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name:        ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ────────────────────────────────────────────────────────────────────────────
  # build-server: build server binaries for each platform (only on release)
  # ────────────────────────────────────────────────────────────────────────────
  build-server:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    name: Build server (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-amd64
            gpu: cpu
          - os: ubuntu-24.04-arm
            name: linux-arm64
            gpu: cpu
          - os: macos-latest
            name: darwin-arm64
            gpu: metal
          - os: windows-latest
            name: windows-amd64
            gpu: cpu
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: meet-translator/server/go.mod
          cache: false

      - name: Install build tools (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get install -y cmake build-essential ninja-build

      - name: Install build tools (Windows)
        if: matrix.os == 'windows-latest'
        run: echo "C:/msys64/usr/bin" >> $GITHUB_PATH

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            meet-translator/server/vendor
          key: ${{ runner.os }}-${{ runner.arch }}-release-${{ hashFiles('meet-translator/server/Makefile') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-release-

      - name: Build
        working-directory: meet-translator/server
        run: make build GPU=${{ matrix.gpu }}

      - name: Archive (Unix)
        if: matrix.os != 'windows-latest'
        working-directory: meet-translator/server
        run: |
          tar czf meet-translator-server-${{ matrix.name }}.tar.gz meet-translator-server

      - name: Archive (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: meet-translator/server
        run: 7z a meet-translator-server-${{ matrix.name }}.zip meet-translator-server.exe

      - uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.name }}
          path: |
            meet-translator/server/meet-translator-server-*.tar.gz
            meet-translator/server/meet-translator-server-*.zip

  # ────────────────────────────────────────────────────────────────────────────
  # package-extension: zip the browser extension
  # ────────────────────────────────────────────────────────────────────────────
  package-extension:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package extension
        run: |
          cd meet-translator/extension
          zip -r ../../meet-translator-extension.zip . -x "*.DS_Store"

      - uses: actions/upload-artifact@v4
        with:
          name: extension
          path: meet-translator-extension.zip

  # ────────────────────────────────────────────────────────────────────────────
  # upload-assets: upload all artifacts to the GitHub Release
  # ────────────────────────────────────────────────────────────────────────────
  upload-assets:
    needs: [release-please, build-server, package-extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          for f in artifacts/*; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --repo "$REPO" --clobber
          done

