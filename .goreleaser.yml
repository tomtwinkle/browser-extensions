# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

# --split モード: 各 OS の CI ジョブがそれぞれの GOOS/GOARCH 向けにビルドし、
# 最後の merge ジョブが全成果物をまとめて GitHub Release を作成する。
# (CGo のクロスコンパイルを避けるため、各 OS でネイティブビルドする)

builds:
  - id: meet-translator-server
    dir: server
    binary: meet-translator-server
    env:
      - CGO_ENABLED=1
    # 各 OS ランナーが自分の GOOS/GOARCH のみビルドするため、
    # goos/goarch は goreleaser が環境変数 GOOS/GOARCH から自動取得する。
    # CI (release.yml) 側で GOOS/GOARCH を設定して --single-target を使う。
    hooks:
      pre:
        - cmd: make -C server whisper
          output: true

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "meet-translator-server_{{ .Os }}_{{ .Arch }}"
    files:
      - server/README.md

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: tomtwinkle
    name: browser-extensions
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  footer: |
    ## セットアップ

    1. お使いの OS のアーカイブをダウンロードして展開
    2. [Ollama](https://ollama.com) をインストールして `ollama pull qwen2.5:7b` を実行
    3. whisper モデルをダウンロード（例: `ggml-base.bin`）
    4. 実行:
       ```
       WHISPER_MODEL=./ggml-base.bin ./meet-translator-server
       ```

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
