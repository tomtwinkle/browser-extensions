# .goreleaser.yml
# ビルドは CI matrix (release.yml) で各 OS ネイティブビルドするため
# goreleaser はリリースノート生成とチェックサム用途のみ。
version: 2

release:
  github:
    owner: tomtwinkle
    name: browser-extensions
  draft: false
  prerelease: auto
  name_template: "meet-translator/v{{ .Version }}"
  footer: |
    ## セットアップ

    ### 拡張機能のインストール

    1. `meet-translator-extension.zip` をダウンロードして任意のフォルダに展開
    2. Chrome / Edge で `chrome://extensions` を開く
    3. 右上の「デベロッパーモード」を有効にする
    4. 「パッケージ化されていない拡張機能を読み込む」をクリックし、展開したフォルダを選択

    ### サーバーのセットアップ

    1. お使いの OS のアーカイブをダウンロードして展開
    2. whisper モデルをダウンロード:
       ```
       curl -L -o ggml-base.bin https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.bin
       ```
    3. llama モデルをダウンロード:
       ```
       # HuggingFace から Qwen2.5-7B-Instruct-Q4_K_M.gguf を取得
       ```
    4. 起動:
       ```
       WHISPER_MODEL=./ggml-base.bin LLAMA_MODEL=./Qwen2.5-7B-Instruct-Q4_K_M.gguf ./meet-translator-server
       ```

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
